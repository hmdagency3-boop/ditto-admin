[build]
  base    = "platform-admin"
  command = "npm install && npm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
